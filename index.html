<!doctype html>

  <head>
    <!-- ════════ PROTECTION DU CODE SOURCE ════════ -->
    <script>
    (function(){
      'use strict';
      // 1. Désactiver le clic droit sauf dans les zones de saisie
      document.addEventListener('contextmenu', function(e){
        const tag = e.target.tagName ? e.target.tagName.toLowerCase() : '';
        if (tag === 'input' || tag === 'textarea' || e.target.isContentEditable) return;
        e.preventDefault(); 
      }, true);

      // 2. Désactiver les raccourcis clavier d'inspection
      document.addEventListener('keydown', function(e){
        // F12
        if (e.key === 'F12') { e.preventDefault(); e.stopPropagation(); return false; }
        // Ctrl+Shift+I / Ctrl+Shift+J / Ctrl+Shift+C / Ctrl+U
        if (e.ctrlKey && e.shiftKey && ['I','i','J','j','C','c'].includes(e.key)) { e.preventDefault(); return false; }
        if (e.ctrlKey && ['U','u'].includes(e.key)) { e.preventDefault(); return false; }
      }, true);

      // 3. Détection DevTools par timing (méthode la plus fiable)
      let _devtoolsOpen = false;
      const _threshold = 160;
      function _detectDevTools() {
        const start = performance.now();
        // Le debugger statement est ignoré si DevTools est fermé, mais prend du temps si ouvert
        // eslint-disable-next-line no-debugger
        debugger;
        const elapsed = performance.now() - start;
        if (elapsed > _threshold && !_devtoolsOpen) {
          _devtoolsOpen = true;
          document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0b1326;color:#ff4040;font-family:monospace;font-size:1.2rem;flex-direction:column;gap:1rem;"><span style="font-size:3rem;">🔒</span><b>Accès non autorisé</b><span>Veuillez fermer les outils de développement.</span></div>';
        }
        if (!_devtoolsOpen) {
          setTimeout(_detectDevTools, 500);
        }
      }
      setTimeout(_detectDevTools, 1000);

      // 4. Désactiver la sélection de texte sur les éléments de code
      document.addEventListener('selectstart', function(e){
        if(e.target.tagName === 'CODE' || e.target.tagName === 'PRE') e.preventDefault();
      });

      // 5. Avertissement dans la console (comme Facebook)
      const _w = [
        '%c⛔ STOP !',
        'color:#ff4040;font-size:3rem;font-weight:bold;',
        '\n%cCette interface est protégée. Toute tentative de copie ou d\'inspection du code est interdite.\n© Mon Assistant IA 2026 — Tous droits réservés.',
        'color:#aaa;font-size:1rem;'
      ];
      console.log(..._w);
    })();
    </script>
    <!-- ════════ FIN PROTECTION ════════ -->

    <style>

        /* Modifying App CSS container */
        #app { height: 100%; display: flex; flex-direction: column; overflow: hidden; }

        /* Fix Tailwind CSS reset breaking MathJax inline math rendering */
        mjx-container svg {
            display: inline !important;
        }

        /* ── Zoom 90% uniquement sur desktop (≥ 1024px) ── */
        @media (min-width: 1024px) {
            html {
                zoom: 0.9;
            }
        }

        /* ── Safe area pour iPhone notch/home bar ── */
        body {
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }

        /* ── Cibles tactiles minimum 44px (recommandation Apple/Google) ── */
        button, [role="button"], select, input[type="submit"] {
            min-height: 44px;
        }

        /* ── Éviter le zoom automatique sur les inputs iOS (min font-size 16px) ── */
        @media (max-width: 767px) {
            input, textarea, select {
                font-size: 16px !important;
            }
        }

        /* ── Meilleure lisibilité du texte sur petit écran ── */
